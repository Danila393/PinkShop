services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: pinkstore_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d pinkstore_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    command: bash -c "python manage.py migrate && daphne -b 0.0.0.0 -p 8000 pinkshop.asgi:application"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=pinkstore_db
      - DB_USER=admin
      - DB_PASSWORD=adminpassword
      - REDIS_HOST=redis
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
